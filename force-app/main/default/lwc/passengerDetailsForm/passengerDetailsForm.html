<template>
    <lightning-card title="Passenger Details" icon-name="standard:people">
        <div class="slds-p-around_medium">

            <!-- Contact ID input -->
            <div class="slds-m-bottom_medium">
                <lightning-input
                    type="text"
                    label="Your Salesforce Contact ID"
                    placeholder="e.g. 0031000000xxxxxx"
                    value={contactId}
                    onchange={handleContactIdChange}
                    required>
                </lightning-input>
                <p class="slds-text-body_small slds-text-color_weak">
                    Enter your Contact ID from Salesforce
                </p>
            </div>

            <!-- Loop through passengers array -->
            <!-- for:each creates one sub-form per passenger -->
            <template for:each={passengers} for:item="passenger" for:index="index">
                <div key={passenger.key} 
                     class="slds-box slds-m-bottom_medium">
                    
                    <h3 class="slds-text-heading_small slds-m-bottom_small">
                        Passenger {passenger.displayIndex}
                    </h3>

                    <!-- First Name and Last Name -->
                    <div class="slds-grid slds-gutters slds-m-bottom_small">
                        <div class="slds-col">
                            <lightning-input
                                type="text"
                                label="First Name"
                                value={passenger.firstName}
                                data-index={index}
                                data-field="firstName"
                                onchange={handlePassengerFieldChange}
                                required>
                            </lightning-input>
                        </div>
                        <div class="slds-col">
                            <lightning-input
                                type="text"
                                label="Last Name"
                                value={passenger.lastName}
                                data-index={index}
                                data-field="lastName"
                                onchange={handlePassengerFieldChange}
                                required>
                            </lightning-input>
                        </div>
                    </div>

                    <!-- Date of Birth and Passenger Type -->
                    <div class="slds-grid slds-gutters slds-m-bottom_small">
                        <div class="slds-col">
                            <lightning-input
                                type="date"
                                label="Date of Birth"
                                value={passenger.dateOfBirth}
                                data-index={index}
                                data-field="dateOfBirth"
                                onchange={handlePassengerFieldChange}
                                required>
                            </lightning-input>
                        </div>
                        <div class="slds-col">
                            <lightning-combobox
                                label="Passenger Type"
                                value={passenger.passengerType}
                                options={passengerTypeOptions}
                                data-index={index}
                                data-field="passengerType"
                                onchange={handlePassengerFieldChange}>
                            </lightning-combobox>
                        </div>
                    </div>

                    <!-- Passport Number -->
                    <div class="slds-m-bottom_small">
                        <lightning-input
                            type="text"
                            label="Passport Number"
                            value={passenger.passportNumber}
                            data-index={index}
                            data-field="passportNumber"
                            onchange={handlePassengerFieldChange}>
                        </lightning-input>
                    </div>

                    <!-- Meal Preference -->
                    <div class="slds-m-bottom_small">
                        <lightning-combobox
                            label="Meal Preference"
                            value={passenger.mealPreference}
                            options={mealOptions}
                            data-index={index}
                            data-field="mealPreference"
                            onchange={handlePassengerFieldChange}>
                        </lightning-combobox>
                    </div>

                    <!-- Error message for this passenger -->
                    <template if:true={passenger.hasError}>
                        <p class="slds-text-color_error">
                            Please fill all required fields for this passenger.
                        </p>
                    </template>

                </div>
            </template>

            <!-- Confirm Button -->
            <div class="slds-m-top_medium">
                <lightning-button
                    label="Confirm Passengers"
                    variant="brand"
                    onclick={handleConfirm}>
                </lightning-button>
                <lightning-button
                    label="← Back"
                    class="slds-m-left_small"
                    onclick={handleBack}>
                </lightning-button>
            </div>

        </div>
    </lightning-card>
</template>
