<template>
    <template if:true={offer}>
        <lightning-card class="slds-m-bottom_small">
            <div class="slds-p-around_medium">

                <!-- Airline Name and Flight Number -->
                <div class="slds-grid slds-gutters slds-m-bottom_small">
                    <div class="slds-col">
                        <p class="slds-text-heading_small">
                            ✈ {offer.airline}
                        </p>
                        <p class="slds-text-body_small slds-text-color_weak">
                            Flight: {offer.flightNumber}
                        </p>
                    </div>
                    <!-- Price on the right side -->
                    <div class="slds-col slds-text-align_right">
                        <p class="slds-text-heading_medium slds-text-color_success">
                            ₹{offer.price}
                        </p>
                        <p class="slds-text-body_small slds-text-color_weak">
                            per person
                        </p>
                    </div>
                </div>

                <!-- Route: Origin → Destination -->
                <div class="slds-grid slds-gutters slds-m-bottom_small">
                    <div class="slds-col slds-text-align_center">
                        <p class="slds-text-heading_small">{offer.origin}</p>
                        <p class="slds-text-body_small">
                            {formattedDepartureTime}
                        </p>
                    </div>
                    <div class="slds-col slds-text-align_center">
                        <!-- Duration calculated from arrival - departure -->
                        <p class="slds-text-body_small slds-text-color_weak">
                            ──── {durationFormatted} ────
                        </p>
                        <lightning-badge 
                            label={offer.cabinClass}>
                        </lightning-badge>
                    </div>
                    <div class="slds-col slds-text-align_center">
                        <p class="slds-text-heading_small">{offer.destination}</p>
                        <p class="slds-text-body_small">
                            {formattedArrivalTime}
                        </p>
                    </div>
                </div>

                <!-- Select Button -->
                <div class="slds-text-align_center slds-m-top_small">
                    <lightning-button
                        label="Select This Flight"
                        variant="brand"
                        onclick={handleSelect}>
                    </lightning-button>
                </div>

            </div>
        </lightning-card>
    <lightning-card class="slds-m-bottom_small">
        <div class="slds-p-around_medium">

            <!-- Airline Name and Flight Number -->

                    </p>

                        Flight: {offer.flightNumber}
                    </p>
                </div>
                <!-- Price on the right side -->
                <div class="slds-col slds-text-align_right">
                    <p class="slds-text-heading_medium slds-text-color_success">
                        ₹{offer.price}
                    </p>
                    <p class="slds-text-body_small slds-text-color_weak">
                        per person

                </div>
            </div>

            <!-- Route: Origin → Destination -->
            <div class="slds-grid slds-gutters slds-m-bottom_small">

                <div class="slds-col slds-text-align_center">

                <div class="slds-col slds-text-align_center">

            <!-- Select Button -->

                <lightning-button

                </lightning-button>
            </div>

        </div>
    </lightning-card>
</template>
